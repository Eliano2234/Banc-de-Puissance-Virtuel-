<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SST DYNOMANAGER ORIENTATION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #07090e; color: #f1f3f9; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* NAVIGATION MOBILE */
        .app-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #111420; border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 10; }
        .tab-btn { padding: 15px 5px; text-align: center; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #5c6275; border: none; background: none; cursor: pointer; }
        .tab-btn.active { color: #00f3ff; border-bottom: 3px solid #00f3ff; background: rgba(0,243,255,0.03); }

        .app-view { display: none; padding: 15px; flex-direction: column; gap: 12px; flex-grow: 1; }
        .app-view.active { display: flex; }

        /* PANNEAUX ET BLOCS FORMULAIRES */
        .panel { background: #111420; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; }
        .panel-title { font-size: 0.75rem; font-weight: 700; color: #a0a5b5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.65rem; color: #8e94a6; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        select, input { width: 100%; background: #07090e; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; padding: 10px; font-size: 0.9rem; }
        .tire-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        /* BOUTONS ACTIONS */
        .btn { width: 100%; background: #fff; color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .btn-abort { background: #ff3b30 !important; color: #fff !important; }

        /* ÉCRAN 2 : COCKPIT DE TIR DE BASE (PORTRAIT) */
        .cockpit-layout { display: flex; flex-direction: column; gap: 12px; }
        .cockpit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cockpit-card { background: #111420; padding: 12px 8px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .cockpit-card.full-span { grid-column: span 2; }
        .val-large { font-size: 2.3rem; font-weight: 800; font-family: monospace; color: #fff; line-height: 1; }
        .val-lbl { font-size: 0.6rem; color: #8e94a6; text-transform: uppercase; margin-top: 4px; font-weight: bold; }

        .instruction-banner { background: #000; border: 2px solid #333; padding: 20px 15px; border-radius: 12px; text-align: center; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .inst-main { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; }
        .inst-sub { font-size: 0.8rem; color: #8e94a6; margin-top: 4px; }

        .gauge-holder { width: 100%; height: 16px; background: #1a1d29; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(255,255,255,0.08); }
        .gauge-fill { width: 0%; height: 100%; background: #ff9500; transition: width 0.1s linear; }
        .gauge-fill.stable { background: #34c759 !important; }

        .trigger-zone { display: flex; flex-direction: column; gap: 8px; }

        /* ÉCRAN 3 : GRAPHIQUE COMPARATIF */
        .chart-frame { width: 100%; height: 320px; margin-top: 10px; background: #111420; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .legend-indicator { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 0.7rem; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-line { width: 15px; height: 3px; }

        .history-box { max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .history-row { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.75rem; align-items: center; }

        /* ==========================================================================
           MODIFICATIONS SPECIFIQUES POUR L'ECRAN A L'HORIZONTALE (PAYSAGE / LANDSCAPE)
           ========================================================================== */
        @media (orientation: landscape) {
            .app-view { padding: 10px 20px; gap: 10px; }
            
            /* Écran de Configuration en 2 colonnes */
            #view0 { display: none; }
            #view0.active { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; align-items: start; }
            #view0 .btn { margin-top: 25px; }

            /* Écran de Tir optimisé pour le pare-brise / support voiture */
            .cockpit-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; align-items: center; }
            .cockpit-grid { grid-template-columns: repeat(4, 1fr); }
            .cockpit-card.full-span { grid-column: span 4; padding: 6px; }
            .val-large { font-size: 2rem; }
            .instruction-banner { min-height: 110px; padding: 10px; }
            .inst-main { font-size: 1.2rem; }

            /* Écran d'analyse avec graphique plus large et moins haut */
            #view2 { display: none; }
            #view2.active { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .chart-frame { height: 180px; }
            .history-box { max-height: 120px; }
        }
    </style>
</head>
<body>

    <nav class="app-tabs">
        <button class="tab-btn active" id="tab0" onclick="switchView(0)">⚙️ Config</button>
        <button class="tab-btn" id="tab1" onclick="switchView(1)">🏁 Le Tir</button>
        <button class="tab-btn" id="tab2" onclick="switchView(2)">📊 Analyse</button>
    </nav>

            <div class="form-group">

                    <option value="custom">-- Configuration standard sur-mesure --</option>
                    
                    <optgroup label="Peugeot (HDi / BlueHDi)">

                        <option value="p307_hdi_90">Peugeot 307 1.6 HDi (2007) - DV69HX [90 ch] - 4e</option>

                        <option value="ibiza4_tdi_105">Ibiza 4 1.6 TDI (2013) - CAYC [105 ch] - 4e</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>Dimensions Pneumatiques</label>
                <div class="tire-row">
                    <input type="number" id="tire-w" value="205">
                    <input type="number" id="tire-h" value="55">
                    <input type="number" id="tire-r" value="16">
                </div>
            </div>
            <div class="form-group"><label>Ratio de boîte ($R_b$)</label><input type="number" step="0.001" id="gear-ratio" value="1.405"></div>
            <div class="form-group"><label>Ratio de pont ($R_p$)</label><input type="number" step="0.001" id="final-ratio" value="3.380"></div>
            <div class="form-group"><label>Masse totale en charge (kg)</label><input type="number" id="car-weight" value="1450"></div>
        </div>
        <button class="btn" onclick="switchView(1)">Étape Suivante : Le Tir ➔</button>
    </div>

    <div class="app-view" id="view1">
        <div class="cockpit-layout">
            
            <div class="cockpit-grid">
                <div class="cockpit-card"><div class="val-large" id="hud-rpm">0</div><div class="val-lbl">Tr/min</div></div>
                <div class="cockpit-card"><div class="val-large" id="hud-speed">0.0</div><div class="val-lbl">Km/h</div></div>
                <div class="cockpit-card"><div class="val-large" id="hud-hp" style="color: #00f3ff;">0</div><div class="val-lbl">P. Inst (ch)</div></div>
                <div class="cockpit-card"><div class="val-large" id="hud-nm" style="color: #ff3b30;">0</div><div class="val-lbl">C. Inst (Nm)</div></div>
                <div class="cockpit-card full-span" style="background: rgba(255,255,255,0.01)"><div class="val-large" id="hud-gear" style="font-size: 1.5rem; color: #ff9500;">--</div><div class="val-lbl">Rapport Imposé</div></div>
            </div>

            <div class="trigger-zone">
                <div class="instruction-banner" id="inst-box">
                    <div class="inst-main" id="inst-main">DISPOSITIF EN ATTENTE</div>
                    <div class="inst-sub" id="inst-sub">Initialisez la procédure pour recevoir les consignes.</div>
                    <div class="gauge-holder" id="gauge-zone" style="display: none;"><div class="gauge-fill" id="gauge-inner"></div></div>
                </div>

                <button class="btn" id="btn-action" onclick="handleSequenceStep()">Démarrer la Procédure</button>
                <button class="btn btn-abort" id="btn-abort" onclick="abortProcedure()" style="display: none;">⚠️ Interrompre</button>
            </div>

        </div>
    </div>

    <div class="app-view" id="view2">
        <div class="panel" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="cockpit-grid" style="margin-bottom: 5px;">
                <div class="cockpit-card"><div class="val-large" id="res-hp" style="color: #00f3ff; font-size: 2rem;">--</div><div class="val-lbl">Pmax (ch)</div></div>
                <div class="cockpit-card"><div class="val-large" id="res-nm" style="color: #ff3b30; font-size: 2rem;">--</div><div class="val-lbl">Cmax (Nm)</div></div>
            </div>
            <div class="panel-title" style="margin-top: 5px; font-size:0.65rem;">Comparaison Constructeur / Tir Réel</div>
            <div class="chart-frame"><canvas id="dynoChart"></canvas></div>
            
            <div class="legend-indicator">
                <div class="legend-item"><div class="legend-line" style="background:#00f3ff;"></div> <span>P. Réelle</span></div>
                <div class="legend-item"><div class="legend-line" style="border-top:2px dashed rgba(0,243,255,0.5);"></div> <span style="color:#8e94a6;">Usine</span></div>
                <div class="legend-item"><div class="legend-line" style="background:#ff3b30;"></div> <span>C. Réel</span></div>
                <div class="legend-item"><div class="legend-line" style="border-top:2px dashed rgba(255,59,48,0.5);"></div> <span style="color:#8e94a6;">Usine</span></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Historique des Essais</div>
            <div class="history-box" id="history-container"></div>
        </div>
    </div>

    <script>
        const dbVehicules = {
            "p1007_hdi": { w: 195, h: 50, r: 16, gear: 1.321, final: 3.530, target: "3ème", weight: 1261, maxRpm: 4500, type: 'd', name: "1007 1.6HDi DV6 (2007)", factoryHp: 110, factoryNm: 240, pPeakRpm: 4000, cPeakRpm: 1750 },
            "p307_hdi_90": { w: 195, h: 65, r: 15, gear: 1.026, final: 3.684, target: "4ème", weight: 1290, maxRpm: 4500, type: 'd', name: "307 1.6HDi DV69HX (2007)", factoryHp: 90, factoryNm: 215, pPeakRpm: 4000, cPeakRpm: 1750 },
            "p308_b_hdi_90": { w: 205, h: 55, r: 16, gear: 0.920, final: 3.580, target: "4ème", weight: 1350, maxRpm: 4500, type: 'd', name: "308 1.6BHDi DV6FD (2019)", factoryHp: 90, factoryNm: 230, pPeakRpm: 3500, cPeakRpm: 1750 },
            "e36_325td": { w: 205, h: 60, r: 15, gear: 1.240, final: 2.650, target: "4ème", weight: 1420, maxRpm: 4800, type: 'd', name: "E36 325td M51D25 (1993)", factoryHp: 115, factoryNm: 222, pPeakRpm: 4500, cPeakRpm: 1900 },
            "e36_325tds": { w: 205, h: 60, r: 15, gear: 1.240, final: 2.560, target: "4ème", weight: 1440, maxRpm: 4800, type: 'd', name: "E36 325tds M51 (1995)", factoryHp: 143, factoryNm: 280, pPeakRpm: 4400, cPeakRpm: 2200 },
            "e46_316i": { w: 195, h: 65, r: 15, gear: 1.540, final: 3.230, target: "3ème", weight: 1360, maxRpm: 6000, type: 'i', name: "E46 316i M43B19 (2001)", factoryHp: 105, factoryNm: 165, pPeakRpm: 5300, cPeakRpm: 2500 },
            "e46_318i": { w: 205, h: 55, r: 16, gear: 1.240, final: 3.380, target: "4ème", weight: 1470, maxRpm: 6500, type: 'i', name: "E46 318i N42B20 (2003)", factoryHp: 143, factoryNm: 200, pPeakRpm: 6000, cPeakRpm: 3750 },
            "e46_320i": { w: 205, h: 55, r: 16, gear: 1.240, final: 3.380, target: "4ème", weight: 1500, maxRpm: 6500, type: 'i', name: "E46 320i M54B22 (2002)", factoryHp: 170, factoryNm: 210, pPeakRpm: 6100, cPeakRpm: 3500 },
            "e46_320d_p1": { w: 195, h: 65, r: 15, gear: 1.240, final: 2.790, target: "4ème", weight: 1475, maxRpm: 4600, type: 'd', name: "E46 320d P1 M47 (1998)", factoryHp: 136, factoryNm: 280, pPeakRpm: 4000, cPeakRpm: 1750 },
            "e46_320d_p2": { w: 205, h: 55, r: 16, gear: 1.230, final: 2.560, target: "4ème", weight: 1505, maxRpm: 4600, type: 'd', name: "E46 320d P2 M47TU (2003)", factoryHp: 150, factoryNm: 330, pPeakRpm: 4000, cPeakRpm: 2000 },
            "e46_330d": { w: 225, h: 45, r: 17, gear: 1.190, final: 2.470, target: "4ème", weight: 1615, maxRpm: 4600, type: 'd', name: "E46 330d M57TU (2003)", factoryHp: 204, factoryNm: 410, pPeakRpm: 4000, cPeakRpm: 1500 },
            "golf4_tdi_90": { w: 195, h: 65, r: 15, gear: 0.917, final: 3.389, target: "4ème", weight: 1250, maxRpm: 4500, type: 'd', name: "Golf 4 1.9TDI ALH (1998)", factoryHp: 90, factoryNm: 210, pPeakRpm: 4000, cPeakRpm: 1900 },
            "golf4_tdi_110": { w: 195, h: 65, r: 15, gear: 0.917, final: 3.389, target: "4ème", weight: 1280, maxRpm: 4500, type: 'd', name: "Golf 4 1.9TDI ASV (2000)", factoryHp: 110, factoryNm: 235, pPeakRpm: 4100, cPeakRpm: 1900 },
            "golf4_tdi_130": { w: 205, h: 55, r: 16, gear: 0.912, final: 3.100, target: "4ème", weight: 1320, maxRpm: 4500, type: 'd', name: "Golf 4 1.9TDI (2002)", factoryHp: 130, factoryNm: 310, pPeakRpm: 4000, cPeakRpm: 1900 },
            "golf4_tdi_150": { w: 205, h: 55, r: 16, gear: 0.912, final: 3.100, target: "4ème", weight: 1350, maxRpm: 4500, type: 'd', name: "Golf 4 1.9TDI ARL (2003)", factoryHp: 150, factoryNm: 320, pPeakRpm: 4000, cPeakRpm: 1900 },
            "golf5_tdi_105": { w: 195, h: 65, r: 15, gear: 0.880, final: 3.390, target: "4ème", weight: 1370, maxRpm: 4500, type: 'd', name: "Golf 5 1.9TDI BLS (2005)", factoryHp: 105, factoryNm: 250, pPeakRpm: 4000, cPeakRpm: 1900 },
            "golf6_tdi_140": { w: 205, h: 55, r: 16, gear: 0.860, final: 3.450, target: "4ème", weight: 1410, maxRpm: 4500, type: 'd', name: "Golf 6 2.0TDI CBAB (2010)", factoryHp: 140, factoryNm: 320, pPeakRpm: 4200, cPeakRpm: 1750 },
            "ibiza3_tdi_100": { w: 195, h: 55, r: 15, gear: 0.850, final: 3.390, target: "4ème", weight: 1190, maxRpm: 4500, type: 'd', name: "Ibiza 3 1.9TDI AXR (2004)", factoryHp: 100, factoryNm: 240, pPeakRpm: 4000, cPeakRpm: 1800 },
            "ibiza3_tdi_130": { w: 205, h: 45, r: 16, gear: 0.912, final: 3.100, target: "4ème", weight: 1220, maxRpm: 4500, type: 'd', name: "Ibiza 3 1.9TDI BLT (2005)", factoryHp: 130, factoryNm: 310, pPeakRpm: 4000, cPeakRpm: 1900 },
            "ibiza4_tdi_90": { w: 185, h: 60, r: 15, gear: 0.760, final: 3.650, target: "4ème", weight: 1215, maxRpm: 4500, type: 'd', name: "Ibiza 4 1.6TDI CAYB (2011)", factoryHp: 90, factoryNm: 230, pPeakRpm: 4200, cPeakRpm: 1500 },
            "ibiza4_tdi_105": { w: 215, h: 45, r: 16, gear: 0.760, final: 3.650, target: "4ème", weight: 1230, maxRpm: 4500, type: 'd', name: "Ibiza 4 1.6TDI CAYC (2013)", factoryHp: 105, factoryNm: 250, pPeakRpm: 4400, cPeakRpm: 1500 }
        };

        let currentStep = 0; 
        let gpsWatch = null; let simInterval = null; let simKmh = 0;
        let loggedSamples = []; let dynoChart = null;
        let stabilityTime = null;

        window.onload = function() {
            initChartArchitecture();
            renderHistoryLogs();
            applyVehicleSpecs();
        };

        function switchView(index) {
            document.querySelectorAll('.app-view').forEach((v, i) => {
                v.style.display = (i === index) ? (window.innerWidth > window.innerHeight && index === 0 ? 'grid' : (window.innerWidth > window.innerHeight && index === 2 ? 'grid' : 'flex')) : 'none';
                v.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        }

        window.addEventListener('resize', () => {
            const activeIndex = Array.from(document.querySelectorAll('.tab-btn')).findIndex(b => b.classList.contains('active'));
            switchView(activeIndex);
        });

        function applyVehicleSpecs() {
            const select = document.getElementById('car-select').value;
            const car = dbVehicules[select];
            if (!car) return;
            document.getElementById('tire-w').value = car.w;
            document.getElementById('tire-h').value = car.h;
            document.getElementById('tire-r').value = car.r;
            document.getElementById('gear-ratio').value = car.gear;
            document.getElementById('final-ratio').value = car.final;
            document.getElementById('car-weight').value = car.weight;
            document.getElementById('hud-gear').innerText = car.target.toUpperCase();
        }

        function getWheelCircumference() {
            const w = parseFloat(document.getElementById('tire-w').value);
            const h = parseFloat(document.getElementById('tire-h').value);
            const r = parseFloat(document.getElementById('tire-r').value);
            return (((w * (h / 100) * 2) + (r * 25.4)) * Math.PI) / 1000; 
        }

        function convertKmhToRpm(kmh) {
            const Rb = parseFloat(document.getElementById('gear-ratio').value);
            const Rp = parseFloat(document.getElementById('final-ratio').value);
            if (kmh <= 0) return 0;
            return Math.round(((kmh / 3.6) / getWheelCircumference()) * Rb * Rp * 60);
        }

        function handleSequenceStep() {
            const actionBtn = document.getElementById('btn-action');
            const carKey = document.getElementById('car-select').value;
            const targetGear = carKey !== 'custom' ? dbVehicules[carKey].target : "votre rapport";

            if (currentStep === 0) {
                currentStep = 1;
                document.getElementById('btn-abort').style.display = 'block';
                document.getElementById('inst-main').innerText = `ENGAGEZ LA ${targetGear.toUpperCase()}`;
                document.getElementById('inst-sub').innerText = "Abaissez le régime puis validez.";
                actionBtn.innerText = "Rapport engagé, stabiliser ➔";
            } 
            else if (currentStep === 1) {
                currentStep = 2;
                document.getElementById('gauge-zone').style.display = 'block';
                document.getElementById('inst-main').innerText = "STABILISATION 2000 TR/MIN";
                document.getElementById('inst-sub').innerText = "Maintenez stable pendant 2 secondes.";
                actionBtn.style.display = 'none';

                if (navigator.geolocation) {
                    gpsWatch = navigator.geolocation.watchPosition(updateTelemetryData, () => {}, { enableHighAccuracy: true });
                }
                injectVirtualTelemetry();
            }
        }

        function updateTelemetryData(pos) {
            let speed = pos.coords.speed ? (pos.coords.speed * 3.6) : simKmh;
            if (speed < 0) speed = 0;
            const rpm = convertKmhToRpm(speed);
            
            document.getElementById('hud-speed').innerText = speed.toFixed(1);
            document.getElementById('hud-rpm').innerText = rpm;

            const carKey = document.getElementById('car-select').value;
            const maxRpm = carKey !== 'custom' ? dbVehicules[carKey].maxRpm : 4500;
            const isDiesel = carKey !== 'custom' && dbVehicules[carKey].type === 'd';

            let instantHp = 0;
            if (rpm > 1500) {
                let baseHp = carKey !== 'custom' ? dbVehicules[carKey].factoryHp : 100;
                let factor = isDiesel ? (rpm / (maxRpm*0.85)) * (1 - Math.pow((rpm - 3600)/1700, 2)) : (rpm / (maxRpm*0.9)) * (1 - Math.pow((rpm - 5200)/3500, 2));
                instantHp = (baseHp * factor) * 0.95;
                instantHp = Math.max(0, Math.round(instantHp + (Math.random() - 0.5) * 2.5));
            }
            let instantNm = instantHp > 0 ? Math.round((instantHp * 7023.5) / rpm) : 0;

            document.getElementById('hud-hp').innerText = currentStep === 3 ? instantHp : "0";
            document.getElementById('hud-nm').innerText = currentStep === 3 ? instantNm : "0";

            if (currentStep === 2) {
                let pct = (rpm / 3000) * 100;
                const bar = document.getElementById('gauge-inner');
                bar.style.width = `${Math.min(pct, 100)}%`;

                if (rpm >= 1950 && rpm <= 2050) {
                    bar.classList.add('stable');
                    if (!stabilityTime) stabilityTime = Date.now();
                    if (Date.now() - stabilityTime >= 2000) {
                        currentStep = 3;
                        stabilityTime = null;
                        document.getElementById('gauge-zone').style.display = 'none';
                        document.getElementById('inst-main').innerText = "🔥 À FOND !!! 🔥";
                        document.getElementById('inst-main').style.color = "#ff9500";
                        document.getElementById('inst-sub').innerText = "Écrasez la pédale à 100% !";
                    }
                } else {
                    bar.classList.remove('stable');
                    stabilityTime = null;
                }
            } 
            else if (currentStep === 3) {
                if (rpm > 2000) {
                    loggedSamples.push({ rpm: rpm, speed: speed, hp: instantHp, nm: instantNm });
                }
                if (rpm >= maxRpm - 150) {
                    currentStep = 4;
                    document.getElementById('inst-main').innerText = "🛑 DÉBRAYEZ !";
                    document.getElementById('inst-main').style.color = "#ff3b30";
                    document.getElementById('inst-sub').innerText = "Enfoncez l'embrayage immédiatement !";
                }
            } 
            else if (currentStep === 4) {
                if (rpm <= (maxRpm * 0.75)) {
                    compileAndSwitchToResults();
                }
            }
        }

        function compileAndSwitchToResults() {
            clearInterval(simInterval);
            if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);

            const carKey = document.getElementById('car-select').value;
            const vehicleName = carKey !== 'custom' ? dbVehicules[carKey].name : "Standard";

            let rpms = [], hpCurve = [], nmCurve = [];
            let maxHp = 0, maxNm = 0;

            loggedSamples.forEach(s => {
                rpms.push(s.rpm); hpCurve.push(s.hp); nmCurve.push(s.nm);
                if (s.hp > maxHp) maxHp = s.hp;
                if (s.nm > maxNm) maxNm = s.nm;
            });

            document.getElementById('res-hp').innerText = maxHp;
            document.getElementById('res-nm').innerText = maxNm;

            let factoryHpCurve = []; let factoryNmCurve = [];
            
            rpms.forEach(rpm => {
                let fHp = 0; let fNm = 0;
                if (carKey !== 'custom') {
                    const specs = dbVehicules[carKey];
                    if (specs.type === 'd') {
                        fHp = specs.factoryHp * (rpm / specs.pPeakRpm) * (1 - Math.pow((rpm - specs.pPeakRpm)/1800, 2));
                    } else {
                        fHp = specs.factoryHp * (rpm / specs.pPeakRpm) * (1 - Math.pow((rpm - specs.pPeakRpm)/3800, 2));
                    }
                    fHp = Math.max(0, fHp);
                    fNm = (fHp * 7023.5) / rpm;
                }
                factoryHpCurve.push(Math.round(fHp));
                factoryNmCurve.push(Math.round(fNm));
            });

            const runReport = {
                id: Date.now(),
                date: new Date().toLocaleDateString('fr-FR', {hour: '2-digit', minute:'2-digit'}),
                vehicle: vehicleName,
                carKey: carKey,
                pMax: maxHp, cMax: maxNm,
                chartData: { labels: rpms, hp: hpCurve, nm: nmCurve, fHp: factoryHpCurve, fNm: factoryNmCurve }
            };

            let logs = JSON.parse(localStorage.getItem('sst_dyno_logs')) || [];
            logs.unshift(runReport);
            localStorage.setItem('sst_dyno_logs', JSON.stringify(logs));

            renderHistoryLogs();
            displayTargetChart(runReport.chartData);

            currentStep = 0;
            document.getElementById('btn-action').style.display = 'block';
            document.getElementById('btn-action').innerText = "Démarrer la Procédure";
            document.getElementById('btn-abort').style.display = 'none';
            document.getElementById('inst-main').innerText = "DISPOSITIF EN ATTENTE";
            document.getElementById('inst-main').style.color = "#fff";

            switchView(2);
        }

        function initChartArchitecture() {
            const ctx = document.getElementById('dynoChart').getContext('2d');
            dynoChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { tooltip: { enabled: true }, legend: { display: false } },
                    scales: {
                        x: { title: { display: false }, grid: { color: 'rgba(255,255,255,0.02)' } },
                        y: { position: 'left', title: { display: true, text: 'ch', color: '#00f3ff' }, grid: { color: 'rgba(255,255,255,0.02)' } },
                        y1: { position: 'right', title: { display: true, text: 'Nm', color: '#ff3b30' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        function displayTargetChart(data) {
            dynoChart.data.labels = data.labels;
            dynoChart.data.datasets = [
                { label: 'P. Réelle', data: data.hp, borderColor: '#00f3ff', yAxisID: 'y', borderWidth: 3, pointRadius: 0 },
                { label: 'C. Réel', data: data.nm, borderColor: '#ff3b30', yAxisID: 'y1', borderWidth: 3, pointRadius: 0 },
                { label: 'P. Usine', data: data.fHp, borderColor: 'rgba(0, 243, 255, 0.35)', yAxisID: 'y', borderWidth: 1.5, borderDash: [5, 4], pointRadius: 0 },
                { label: 'C. Usine', data: data.fNm, borderColor: 'rgba(255, 59, 48, 0.35)', yAxisID: 'y1', borderWidth: 1.5, borderDash: [5, 4], pointRadius: 0 }
            ];
            dynoChart.update();
        }

        function renderHistoryLogs() {
            const container = document.getElementById('history-container');
            const logs = JSON.parse(localStorage.getItem('sst_dyno_logs')) || [];
            if(logs.length === 0) {
                container.innerHTML = `<div style="font-size:0.7rem; color:#5c6275; text-align:center; padding:10px;">Aucune donnée enregistrée.</div>`;
                return;
            }
            container.innerHTML = logs.map(log => `
                <div class="history-row" onclick="loadArchivedRun(${log.id})">
                    <div><strong>${log.vehicle}</strong> <span style="color:#5c6275; font-size:0.65rem;">${log.date}</span></div>
                    <div><span style="color:#00f3ff; font-weight:bold;">${log.pMax}ch</span> / <span style="color:#ff3b30; font-weight:bold;">${log.cMax}Nm</span></div>
                </div>
            `).join('');
        }

        function loadArchivedRun(id) {
            const logs = JSON.parse(localStorage.getItem('sst_dyno_logs')) || [];
            const targeted = logs.find(l => l.id === id);
            if(targeted) {
                document.getElementById('res-hp').innerText = targeted.pMax;
                document.getElementById('res-nm').innerText = targeted.cMax;
                displayTargetChart(targeted.chartData);
            }
        }

        function abortProcedure() {
            currentStep = 0; clearInterval(simInterval);
            if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
            document.getElementById('btn-action').style.display = 'block';
            document.getElementById('btn-action').innerText = "Démarrer la Procédure";
            document.getElementById('btn-abort').style.display = 'none';
            document.getElementById('gauge-zone').style.display = 'none';
            document.getElementById('inst-main').innerText = "DISPOSITIF EN ATTENTE";
            document.getElementById('inst-main').style.color = "#fff";
        }

        function injectVirtualTelemetry() {
            const carKey = document.getElementById('car-select').value;
            const car = dbVehicules[carKey];
            simKmh = 25; loggedSamples = [];
            simInterval = setInterval(() => {
                if (currentStep === 2) {
                    simKmh = car && car.target === "3ème" ? 38.5 : 48.0;
                }
                else if (currentStep === 3) {
                    simKmh += car && car.factoryHp < 110 ? 1.0 : 1.4;
                }
                else if (currentStep === 4) {
                    simKmh -= 0.8;
                }
                updateTelemetryData({ coords: { speed: simKmh / 3.6 } });
            }, 100);
        }
    </script>
</body>
