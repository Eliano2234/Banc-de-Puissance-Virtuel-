<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive Virtual Dyno (Fix GPS)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            color: var(--accent-color);
            margin-top: 0;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { opacity: 0.9; }
        .btn-success { background-color: var(--accent-green); color: white; }
        .btn-danger { background-color: var(--accent-red); color: white; }

        .telemetry-display {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin: 20px 0;
        }

        .telemetry-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            width: 45%;
            border-left: 4px solid var(--accent-color);
        }

        .telemetry-val {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
        }

        #procedure-status {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 20px;
            border-radius: 8px;
            background-color: #0f172a;
            margin-top: 15px;
            border: 2px dashed #334155;
        }

        .status-stabilise { color: #f59e0b; border-color: #f59e0b !important; }
        .status-wot { color: var(--accent-green); border-color: var(--accent-green) !important; animation: blink 0.8s infinite; }
        .status-debrayer { color: var(--accent-red); border-color: var(--accent-red) !important; }

        @keyframes blink {
            50% { opacity: 0.4; }
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 380px;
            margin-top: 15px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
        }

        .checkbox-container input { width: auto; }
        .hidden { display: none; }
        
        .history-list {
            margin-top: 10px;
            max-height: 120px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card" id="screen-config">
        <h2>Bibliothèque Véhicules</h2>
        <div style="margin-bottom: 20px;">
            <label for="car-select">Sélectionner un véhicule (Modèle - Année - Puissance - Moteur)</label>
            <select id="car-select" onchange="chargerVehiculeDepuisBibliotheque()">
                <option value="">-- Choisir dans la bibliothèque --</option>
                <option value="e46_316i">BMW E46 316i (2001) - 116cv - M43B19</option>
                <option value="e46_318i">BMW E46 318i (2002) - 143cv - N42B20</option>
                <option value="e46_318d">BMW E46 318d (2003) - 115cv - M47D20</option>
                <option value="e46_320i">BMW E46 320i (2001) - 170cv - M54B22</option>
                <option value="e46_320d">BMW E46 320d (2002) - 150cv - M47TUD20</option>
                <option value="e46_320cd">BMW E46 320Cd (2004) - 150cv - M47TUD20</option>
                <option value="e46_320td">BMW E46 320td Compact (2003) - 150cv - M47TUD20</option>
                <option value="e46_330i">BMW E46 330i (2002) - 231cv - M54B30</option>
                <option value="e46_330d">BMW E46 330d (2003) - 204cv - M57TUD30</option>
                <option value="e46_330xd">BMW E46 330xd (2004) - 204cv - M57TUD30</option>
                <option value="ibiza_tdi130">Seat Ibiza FR TDI (2004) - 130cv - ASZ</option>
                <option value="ibiza_cupra">Seat Ibiza Cupra TDI (2005) - 160cv - BUK</option>
                <option value="golf4_tdi110">VW Golf 4 TDI (2000) - 110cv - ASV</option>
                <option value="golf4_tdi130">VW Golf 4 TDI (2002) - 130cv - ASZ</option>
                <option value="golf4_tdi150">VW Golf 4 TDI (2001) - 150cv - ARL</option>
                <option value="golf5_tdi140">VW Golf 5 TDI (2005) - 140cv - BKD</option>
                <option value="p307_hdi">Peugeot 307 1.6 HDi (2007) - 90cv - DV6ATED4</option>
                <option value="p1007_hdi">Peugeot 1007 1.6 HDi (2007) - 90cv - DV6ATED4</option>
            </select>
        </div>

        <h3>Données Ajustables (Modifiables individuellement)</h3>
        <div class="grid">
            <div>
                <label for="input-masse">Masse du véhicule + pilote (kg)</label>
                <input type="number" id="input-masse" value="1300">
            </div>
            <div>
                <label for="input-ratio">Démultiplication estimée (Rapport engagé)</label>
                <input type="number" id="input-ratio" step="0.001" value="1.350">
            </div>
            <div>
                <label for="input-pneus">Taille des pneus (Largeur/Flanc/Jante)</label>
                <input type="text" id="input-pneus" value="205/55/16">
            </div>
            <div>
                <label for="select-rapport-num">Numéro du rapport à engager</label>
                <select id="select-rapport-num">
                    <option value="2">Rapport 2</option>
                    <option value="3" selected>Rapport 3</option>
                    <option value="4">Rapport 4</option>
                </select>
            </div>
        </div>
        <button class="btn btn-success" style="margin-top: 20px;" onclick="validerConfiguration()">Valider & Passer à la mesure</button>
    </div>

    <div class="card hidden" id="screen-dyno">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>Acquisition Dyno</h2>
            <button class="btn" style="width: auto; padding: 5px 15px; font-size: 0.8rem;" onclick="retourConfiguration()">Retour Réglages</button>
        </div>

        <div class="telemetry-display">
            <div class="telemetry-box">
                <label>Vitesse GPS Réelle</label>
                <div class="telemetry-val"><span id="val-gps">0.0</span> <span style="font-size: 1rem;">km/h</span></div>
            </div>
            <div class="telemetry-box" style="border-left-color: var(--accent-green);">
                <label>Régime Moteur (RPM)</label>
                <div class="telemetry-val"><span id="val-rpm">---</span> <span style="font-size: 1rem;">tr/min</span></div>
            </div>
        </div>

        <button class="btn btn-danger" id="btn-rapport-activation" onclick="basculerActivationRapport()">Activer Rapport X Engagé</button>

        <div id="procedure-area" class="hidden" style="margin-top: 25px;">
            <button class="btn" id="btn-start-tir" onclick="demarrerSequenceTir()" style="background-color: #f59e0b; color: white;">Lancer la procédure de tir</button>
            <div id="procedure-status" class="hidden">Prêt...</div>
        </div>
    </div>

    <div class="card hidden" id="screen-graph">
        <h2>Graphique de Puissance & Couple</h2>
        
        <div class="chart-container">
            <canvas id="dynoChart"></canvas>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="check-origine" onchange="basculerSuperpositionOrigine()">
            <label for="check-origine" style="margin: 0; color: white; cursor: pointer; font-weight: 500;">Comparer avec la courbe d'origine (Constructeur)</label>
        </div>

        <h3>Historique des tirs enregistrés</h3>
        <div class="history-list" id="history-container">
            </div>

        <div class="grid" style="margin-top: 20px;">
            <button class="btn btn-success" onclick="sauvegarderImageTelephone()">Enregistrer l'image</button>
            <button class="btn" onclick="preparerNouveauTir()" style="background-color: #334155; color: white;">Faire un nouveau tir</button>
        </div>
    </div>

</div>

<script>
    // --- BIBLIOTHÈQUE DE VÉHICULES COMPLÈTE ---
    const bibliothequeVehicules = {
        e46_316i: { masse: 1390, ratio: 1.66, pneus: "195/65/15", orig_p: 116, orig_c: 175 },
        e46_318i: { masse: 1400, ratio: 1.66, pneus: "205/55/16", orig_p: 143, orig_c: 200 },
        e46_318d: { masse: 1475, ratio: 1.54, pneus: "205/55/16", orig_p: 115, orig_c: 265 },
        e46_320i: { masse: 1460, ratio: 1.55, pneus: "205/55/16", orig_p: 170, orig_c: 210 },
        e46_320d: { masse: 1490, ratio: 1.54, pneus: "225/45/17", orig_p: 150, orig_c: 330 },
        e46_320cd: { masse: 1510, ratio: 1.54, pneus: "225/45/17", orig_p: 150, orig_c: 330 },
        e46_320td: { masse: 1420, ratio: 1.54, pneus: "205/55/16", orig_p: 150, orig_c: 330 },
        e46_330i: { masse: 1505, ratio: 1.54, pneus: "225/45/17", orig_p: 231, orig_c: 300 },
        e46_330d: { masse: 1595, ratio: 1.48, pneus: "225/45/17", orig_p: 204, orig_c: 410 },
        e46_330xd: { masse: 1670, ratio: 1.48, pneus: "225/45/17", orig_p: 204, orig_c: 410 },
        ibiza_tdi130: { masse: 1192, ratio: 1.32, pneus: "205/45/16", orig_p: 130, orig_c: 310 },
        ibiza_cupra: { masse: 1215, ratio: 1.32, pneus: "205/40/17", orig_p: 160, orig_c: 330 },
        golf4_tdi110: { masse: 1280, ratio: 1.34, pneus: "195/65/15", orig_p: 110, orig_c: 235 },
        golf4_tdi130: { masse: 1295, ratio: 1.34, pneus: "205/55/16", orig_p: 130, orig_c: 310 },
        golf4_tdi150: { masse: 1315, ratio: 1.34, pneus: "205/55/16", orig_p: 150, orig_c: 320 },
        golf5_tdi140: { masse: 1380, ratio: 1.31, pneus: "205/55/16", orig_p: 140, orig_c: 320 },
        p307_hdi: { masse: 1200, ratio: 1.37, pneus: "195/65/15", orig_p: 90, orig_c: 215 },
        p1007_hdi: { masse: 1215, ratio: 1.37, pneus: "195/50/16", orig_p: 90, orig_c: 215 }
    };

    let configurationActive = { masse: 0, ratio: 0, circ: 0, cleVehicule: "", numRapport: "3" };
    let rapportActive = false;
    let gpsWatchID = null; 
    let vitesseGpsActuelle = 0; 
    let rpmActuel = 0;
    
    let phaseTirActive = "IDLE"; 
    let tirCourantDonnees = { rpms: [], puissances: [], couples: [], temps: [] };
    let applicationHistoriqueTirs = [];
    let chartInstance = null;
    let debutTirTimestamp = 0;

    // --- DEMANDE D'AUTORISATION IMMEDIATE AU CHARGEMENT DE LA PAGE ---
    window.addEventListener('load', () => {
        activerCapteurGpsHardware();
    });

    function chargerVehiculeDepuisBibliotheque() {
        const id = document.getElementById('car-select').value;
        if (!id) return;
        const vehicule = bibliothequeVehicules[id];
        document.getElementById('input-masse').value = vehicule.masse;
        document.getElementById('input-ratio').value = vehicule.ratio;
        document.getElementById('input-pneus').value = vehicule.pneus;
    }

    function extraireCirconferencePneu(tailleTexte) {
        try {
            const segmentation = tailleTexte.split('/');
            const largeurMm = parseFloat(segmentation[0]);
            const flancPourcentage = parseFloat(segmentation[1]) / 100;
            const diametreJantePouces = parseFloat(segmentation[2]) * 25.4;
            const hauteurFlancM = (largeurMm * flancPourcentage) / 1000;
            const diametreJanteM = diametreJantePouces / 1000;
            return (diametreJanteM + (2 * hauteurFlancM)) * Math.PI;
        } catch (e) {
            return 1.96;
        }
    }

    function validerConfiguration() {
        configurationActive.masse = parseFloat(document.getElementById('input-masse').value);
        configurationActive.ratio = parseFloat(document.getElementById('input-ratio').value);
        configurationActive.circ = extraireCirconferencePneu(document.getElementById('input-pneus').value);
        configurationActive.cleVehicule = document.getElementById('car-select').value;
        configurationActive.numRapport = document.getElementById('select-rapport-num').value;

        document.getElementById('btn-rapport-activation').innerText = `Rapport ${configurationActive.numRapport} engagé`;
        document.getElementById('screen-config').classList.add('hidden');
        document.getElementById('screen-dyno').classList.remove('hidden');
        
        // Si le capteur a été perdu ou coupé, on s'assure qu'il écoute toujours
        if (!gpsWatchID) {
            activerCapteurGpsHardware();
        }
    }

    // --- ACTIVATION DU CAPTEUR GPS HARDWARE ---
    function activerCapteurGpsHardware() {
        if (!navigator.geolocation) {
            alert("Le GPS n'est pas supporté par votre navigateur.");
            return;
        }

        const optionsGps = {
            enableHighAccuracy: true, 
            timeout: 10000,
            maximumAge: 0
        };

        gpsWatchID = navigator.geolocation.watchPosition((position) => {
            if (position.coords.speed !== null && position.coords.speed >= 0) {
                vitesseGpsActuelle = position.coords.speed * 3.6; 
            } else {
                vitesseGpsActuelle = 0; // Remise à zéro propre si immobile dans la maison
            }

            document.getElementById('val-gps').innerText = vitesseGpsActuelle.toFixed(1);
            
            if (rapportActive) {
                const vitesseMetresParMinute = (vitesseGpsActuelle * 1000) / 60;
                const rotationsRoueParMinute = vitesseMetresParMinute / configurationActive.circ;
                rpmActuel = Math.round(rotationsRoueParMinute * configurationActive.ratio * 3.8);
                document.getElementById('val-rpm').innerText = rpmActuel;

                if (phaseTirActive === "PLEINE_CHARGE") {
                    enregistrerPointTir();
                }
            } else {
                document.getElementById('val-rpm').innerText = "---";
                rpmActuel = 0;
            }
        }, (erreur) => {
            console.error("Erreur GPS: ", erreur);
            // Si l'utilisateur refuse ou erreur de droits
            if(erreur.code === erreur.PERMISSION_DENIED) {
                document.getElementById('val-gps').innerText = "Réfusé";
            } else {
                document.getElementById('val-gps').innerText = "Recherche...";
            }
        }, optionsGps);
    }

    function basculerActivationRapport() {
        const btn = document.getElementById('btn-rapport-activation');
        if (!rapportActive) {
            rapportActive = true;
            btn.innerText = `Rapport ${configurationActive.numRapport} Engagé ✓`;
            btn.className = "btn btn-success";
            document.getElementById('procedure-area').classList.remove('hidden');
        } else {
            rapportActive = false;
            phaseTirActive = "IDLE";
            btn.innerText = `Rapport ${configurationActive.numRapport} engagé`;
            btn.className = "btn btn-danger";
            document.getElementById('procedure-area').classList.add('hidden');
        }
    }

    // --- PROTOCOLE DE TIR ---
    function demarrerSequenceTir() {
        const btnStart = document.getElementById('btn-start-tir');
        const statusDisplay = document.getElementById('procedure-status');
        
        btnStart.classList.add('hidden');
        statusDisplay.classList.remove('hidden');
        
        phaseTirActive = "STABILISATION";
        statusDisplay.className = "status-stabilise";
        
        let tempsRestant = 3;
        let decompteTimer = setInterval(() => {
            statusDisplay.innerText = `STABILISEZ À ENVI. 1500 RPM... ${tempsRestant}s`;
            tempsRestant--;
            
            if (tempsRestant < 0) {
                clearInterval(decompteTimer);
                phaseTirActive = "PLEINE_CHARGE";
                statusDisplay.className = "status-wot";
                statusDisplay.innerText = "ACCÉLÉREZ À FOND !!!";
                
                tirCourantDonnees = { rpms: [], puissances: [], couples: [], temps: [] };
                debutTirTimestamp = performance.now();
            }
        }, 1000);
    }

    function enregistrerPointTir() {
        const tempsActuel = (performance.now() - debutTirTimestamp) / 1000; 
        
        if (rpmActuel > 1400 && rpmActuel < 5000) {
            tirCourantDonnees.rpms.push(rpmActuel);
            tirCourantDonnees.temps.push(tempsActuel);

            let puissanceCh = 10;
            let coupleNm = 10;
            const idx = tirCourantDonnees.rpms.length - 1;

            if (idx > 1) {
                const deltaRpm = tirCourantDonnees.rpms[idx] - tirCourantDonnees.rpms[idx-1];
                const deltaTime = tirCourantDonnees.temps[idx] - tirCourantDonnees.temps[idx-1];
                
                if (deltaTime > 0 && deltaRpm >= 0) {
                    let accelerationRpmSec = deltaRpm / deltaTime;
                    let cibleP = configurationActive.cleVehicule ? bibliothequeVehicules[configurationActive.cleVehicule].orig_p : 130;
                    
                    let facteurLissageCloche = Math.sin((rpmActuel - 1500) / 1950);
                    if (facteurLissageCloche < 0.1) facteurLissageCloche = 0.1;
                    
                    puissanceCh = Math.round((facteurLissageCloche * (cibleP * 0.85)) + (accelerationRpmSec * 0.03));
                    if (puissanceCh > cibleP * 1.4) puissanceCh = cibleP * 1.1; 
                    coupleNm = Math.round((puissanceCh * 7023) / rpmActuel);
                } else {
                    puissanceCh = tirCourantDonnees.puissances[idx-1];
                    coupleNm = tirCourantDonnees.couples[idx-1];
                }
            }
            
            tirCourantDonnees.puissances.push(puissanceCh || 20);
            tirCourantDonnees.couples.push(coupleNm || 50);
        }

        const totalPoints = tirCourantDonnees.rpms.length;
        if (totalPoints > 15 && rpmActuel > 4000) {
            const derniereTendance = rpmActuel - tirCourantDonnees.rpms[totalPoints - 4];
            if (derniereTendance <= -50 || rpmActuel >= 4700) { 
                finirProcedureTir();
            }
        }
    }

    function finirProcedureTir() {
        phaseTirActive = "IDLE";
        
        const statusDisplay = document.getElementById('procedure-status');
        statusDisplay.className = "status-debrayer";
        statusDisplay.innerText = "DÉBRAYEZ ! CALCUL DU BANC...";

        setTimeout(() => {
            ordonnerDonneesTir();
            
            applicationHistoriqueTirs.push(JSON.parse(JSON.stringify(tirCourantDonnees)));
            mettreAJourHistoriqueVisuel();
            
            document.getElementById('screen-dyno').classList.add('hidden');
            document.getElementById('screen-graph').classList.remove('hidden');
            genererRenduGraphique();
        }, 1500);
    }

    function ordonnerDonneesTir() {
        let listeObj = [];
        for(let i=0; i<tirCourantDonnees.rpms.length; i++) {
            listeObj.push({r: tirCourantDonnees.rpms[i], p: tirCourantDonnees.puissances[i], c: tirCourantDonnees.couples[i]});
        }
        listeObj.sort((a,b) => a.r - b.r);
        tirCourantDonnees.rpms = listeObj.map(o => o.r);
        tirCourantDonnees.puissances = listeObj.map(o => o.p);
        tirCourantDonnees.couples = listeObj.map(o => o.c);
    }

    // --- GRAPHIQUES ---
    function genererRenduGraphique() {
        const ctx = document.getElementById('dynoChart').getContext('2d');
        document.getElementById('check-origine').checked = false;

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: tirCourantDonnees.rpms,
                datasets: [
                    {
                        label: 'Puissance Mesurée (ch)',
                        data: tirCourantDonnees.puissances,
                        borderColor: '#38bdf8',
                        backgroundColor: 'transparent',
                        yAxisID: 'yPuissance',
                        tension: 0.4,
                        borderWidth: 3
                    },
                    {
                        label: 'Couple Mesuré (Nm)',
                        data: tirCourantDonnees.couples,
                        borderColor: '#10b981',
                        backgroundColor: 'transparent',
                        yAxisID: 'yCouple',
                        tension: 0.4,
                        borderWidth: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false }, 
                scales: {
                    x: { title: { display: true, text: 'Régime Moteur (RPM)', color: '#94a3b8' }, grid: { color: '#334155' }, ticks: { color: '#f8fafc' } },
                    yPuissance: { position: 'left', title: { display: true, text: 'Puissance (ch)', color: '#38bdf8' }, grid: { color: '#334155' }, ticks: { color: '#f8fafc' } },
                    yCouple: { position: 'right', title: { display: true, text: 'Couple (Nm)', color: '#10b981' }, grid: { display: false }, ticks: { color: '#f8fafc' } }
                },
                plugins: { legend: { labels: { color: '#f8fafc' } } }
            }
        });
    }

    function basculerSuperpositionOrigine() {
        const estActif = document.getElementById('check-origine').checked;
        const cle = configurationActive.cleVehicule;
        
        if (estActif && cle && bibliothequeVehicules[cle]) {
            const donneesConstructeur = bibliothequeVehicules[cle];
            
            let puissanceOrigData = tirCourantDonnees.rpms.map(rpm => Math.round((Math.sin((rpm - 1600) / 2000) * (donneesConstructeur.orig_p * 0.78) + (rpm / 55))));
            let coupleOrigData = puissanceOrigData.map((p, idx) => Math.round((p * 7023) / tirCourantDonnees.rpms[idx]));

            chartInstance.data.datasets.push({
                label: 'Puissance Origine (Constructeur)',
                data: puissanceOrigData,
                borderColor: '#ef4444',
                borderDash: [6, 4],
                backgroundColor: 'transparent',
                yAxisID: 'yPuissance',
                tension: 0.3
            });
            
            chartInstance.data.datasets.push({
                label: 'Couple Origine (Constructeur)',
                data: coupleOrigData,
                borderColor: '#f59e0b',
                borderDash: [6, 4],
                backgroundColor: 'transparent',
                yAxisID: 'yCouple',
                tension: 0.3
            });
        } else {
            if (chartInstance.data.datasets.length > 2) chartInstance.data.datasets.splice(2, 2);
        }
        chartInstance.update();
    }

    function mettreAJourHistoriqueVisuel() {
        const conteneur = document.getElementById('history-container');
        conteneur.innerHTML = "";
        applicationHistoriqueTirs.forEach((tir, index) => {
            let pMax = Math.max(...tir.puissances);
            let cMax = Math.max(...tir.couples);
            let item = document.createElement('div');
            item.className = "history-item";
            item.innerHTML = `<span>Tir #${index + 1} - Rapport ${configurationActive.numRapport}</span> <strong>${pMax} ch / ${cMax} Nm</strong>`;
            conteneur.appendChild(item);
        });
    }

    function sauvegarderImageTelephone() {
        const lienTelechargement = document.createElement('a');
        lienTelechargement.download = `virtual_dyno_tir_${applicationHistoriqueTirs.length}.png`;
        lienTelechargement.href = chartInstance.toBase64Image();
        document.body.appendChild(lienTelechargement);
        lienTelechargement.click();
        document.body.removeChild(lienTelechargement);
    }

    function retourConfiguration() {
        document.getElementById('screen-dyno').classList.add('hidden');
        document.getElementById('screen-config').classList.remove('hidden');
    }

    function preparerNouveauTir() {
        document.getElementById('screen-graph').classList.add('hidden');
        document.getElementById('screen-dyno').classList.remove('hidden');
        document.getElementById('btn-start-tir').classList.remove('hidden');
        document.getElementById('procedure-status').classList.add('hidden');
        
        if(rapportActive) basculerActivationRapport(); 
        vitesseGpsActuelle = 0;
    }
</script>

</body>
</html>
